<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chat with User</title>
<style>
/* ===== GLOBAL RESET ===== */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: stretch;
}

.chat-container {
  width: 100%;
  max-width: 600px;
  height: 100vh;
  display: flex;
  flex-direction: column; /* This makes the header/footer sticky */
  background: #1e293b;
  overflow: hidden;
}

/* ===== CHAT HEADER (FIXED OVERLAP) ===== */
.chat-header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  background: #0f172a;
  z-index: 10;
  border-bottom: 1px solid #334155;
  
  /* THIS FIXES THE PHONE STATUS BAR OVERLAP */
  padding: 10px;
  padding-top: calc(10px + env(safe-area-inset-top, 20px)); 
}

.chat-header img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  object-fit: cover;
}

.chat-header .user-info {
  display: flex;
  flex-direction: column;
}

.chat-header .user-info span {
  font-size: 12px;
  opacity: 0.7;
}

/* ===== MESSAGES AREA (SCROLLABLE) ===== */
.messages {
  flex: 1; /* This pushes the footer to the bottom */
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #1e293b;
}

.message {
  padding: 10px 15px;
  border-radius: 15px;
  max-width: 70%;
  word-break: break-word;
  display: flex;
  align-items: center;
}

.sent { background: #2563eb; align-self: flex-end; }
.received { background: #334155; align-self: flex-start; }

.message .time { font-size: 10px; margin-left: 5px; opacity: 0.7; }
.message .tick { font-size: 10px; margin-left: 3px; opacity: 0.7; }

/* ===== INPUT BOX (STICKY FOOTER) ===== */
.inputBox {
  flex-shrink: 0;
  display: flex;
  padding: 10px;
  /* Extra padding for bottom gesture bars on mobile */
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  background: #1e293b;
  z-index: 10;
  border-top: 1px solid #334155;
}

.inputBox input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #0f172a; 
  color: white;
  outline: none;
}

.inputBox button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

#backBtn {
  background: none;
  border: none;
  color: #2563eb;
  cursor: pointer;
  font-weight: bold;
  padding: 5px 10px;
}

/* ===== MOBILE ===== */
@media(max-width:700px){
  body{ align-items:flex-start; }
}
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <button id="backBtn">← Back</button>
    <img id="chatUserPhoto" src="uploads/profile.webp">
    <div class="user-info">
      <span id="chatUsername">+User</span>
      <span id="chatStatus">Offline</span>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button id="sendBtn">Send</button>
  </div>
</div>

<audio id="msgSound" src="sounds/message.mp3" preload="auto"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
// I have kept ALL your original logic below exactly as it was
const socket = io();
const userId = localStorage.getItem("userId");
if(!userId) window.location.href="index.html";

const params = new URLSearchParams(window.location.search);
const chatWithId = params.get("user");
if(!chatWithId) { alert("No user selected"); window.location.href="dashboard.html"; }

const chatUsernameEl = document.getElementById("chatUsername");
const chatPhotoEl = document.getElementById("chatUserPhoto");
const chatStatusEl = document.getElementById("chatStatus");
const messagesEl = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const msgSound = document.getElementById("msgSound");

socket.emit("register", userId);

document.getElementById("backBtn").addEventListener("click", ()=> window.location.href="dashboard.html");

let onlineUsers = [];
let lastSeenRaw = null; // Storing raw date for the helper function

// --- NEW HELPER FOR DYNAMIC TIME ---
function getTimeAgo(date) {
  if (!date) return "N/A";
  const now = new Date();
  const past = new Date(date);
  const diffMin = Math.floor((now - past) / 60000);

  if (diffMin < 1) return "Just now";
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffH = Math.floor(diffMin / 60);
  if (diffH < 24) return `${diffH}h ago`;
  return past.toLocaleDateString();
}

function updateStatus() {
  const isOnline = onlineUsers.includes(chatWithId);
  // Using the helper here instead of the raw long string
  chatStatusEl.textContent = isOnline ? "🟢 Online" : `⚫ Offline - last seen ${getTimeAgo(lastSeenRaw)}`;
}

fetch(`/user?id=${chatWithId}`)
  .then(res=>res.json())
  .then(user=>{
    lastSeenRaw = user.lastSeen; // Store the actual timestamp
    chatUsernameEl.textContent = "+" + user.username;
    chatPhotoEl.src = "uploads/profile.webp";
    updateStatus();
  });

// Refresh the "Time Ago" every minute while the user is on the chat page
setInterval(updateStatus, 60000);

socket.on("online-users", users => {
  onlineUsers = users;
  updateStatus();
});

async function loadMessages(){
  const res = await fetch(`/messages?userId=${userId}&chatWith=${chatWithId}`);
  const msgs = await res.json();
  messagesEl.innerHTML = ""; 
  msgs.forEach(m=>appendMessage(m,m.seen));
}
loadMessages();

function appendMessage(msg, seen=false){
  const div = document.createElement("div");
  div.classList.add("message", msg.from === userId ? "sent" : "received");
  
  const time = new Date(msg.timestamp);
  const hours = time.getHours().toString().padStart(2,"0");
  const minutes = time.getMinutes().toString().padStart(2,"0");
  
  let tickHTML = "";
  if(msg.from === userId) tickHTML = seen ? "✔✔" : "✔";
  
  div.innerHTML = `${msg.message} <span class="time">${hours}:${minutes}</span> <span class="tick">${tickHTML}</span>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

sendBtn.addEventListener("click", sendMessage);
messageInput.addEventListener("keypress", e=>{if(e.key==="Enter") sendMessage();});

function sendMessage(){
  const msg = messageInput.value.trim();
  if(!msg) return;
  socket.emit("send-message",{to:chatWithId, message:msg});
  appendMessage({from:userId, message:msg, timestamp:new Date()});
  messageInput.value="";
}

socket.on("private message", msg => {
  if (msg.from === userId) return; 

  if(msg.from === chatWithId){
    appendMessage(msg, msg.seen);
    msgSound.play();
    socket.emit("messageSeen", {from:msg.from, to:userId});
  } else {
    msgSound.play();
    if(Notification.permission === "granted") {
      new Notification("New Message", {body:msg.message, icon:"uploads/profile.webp"});
    }
  }
});

socket.on("messageSeen", ({from}) => {
  if(from === chatWithId){
    const ticks = messagesEl.querySelectorAll(".sent .tick");
    ticks.forEach(tick => tick.textContent = "✔✔");
  }
});

if(Notification.permission !== "granted") Notification.requestPermission();
</script>

</body>
</html>
