<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Gara Dashboard</title>
<style>
/* ===== GLOBAL RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#000,#0f172a,#1e3a8a);
  display:flex; justify-content:center; align-items:center;
}

/* ===== DASHBOARD ===== */
.dashboard-container{
  width:95%; max-width:1200px; height:90vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:15px; display:flex; overflow:hidden;
}
.sidebar{ width:100%; padding:20px; color:white; display:flex; flex-direction:column; }
.search{ width:100%; padding:10px; margin:10px 0; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; }
.user-list{flex:1; overflow-y:auto;}
.user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,0.06);cursor:pointer;position:relative;color:white;}
.user:hover{background:rgba(37,99,235,0.3);}
.user-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;}
.user-info{display:flex;flex-direction:column;}
.username{font-weight:600;}
.status{font-size:12px;opacity:0.8;}
.last-seen{font-size:10px;opacity:0.6;}
.badge{position:absolute;right:10px;top:12px;background:#22c55e;color:white;font-size:12px;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center;display:none;}

/* ===== PROFILE BUTTON ===== */
.profile-container { position:fixed; top:20px; right:20px; z-index:99999; }
.profile-btn {
  display:flex; align-items:center; gap:10px; padding:8px 15px;
  border-radius:30px; border:none; color:white; cursor:pointer;
  background:linear-gradient(45deg,#ff0000,#2563eb);
}
#profilePhoto { width:35px; height:35px; border-radius:50%; object-fit:cover; }

/* ===== PROFILE MENU ===== */
.profile-menu {
  display:none; position:absolute; top:60px; right:0; width:220px;
  background:#0f172a; padding:15px; border-radius:12px;
  flex-direction:column; gap:10px; border:1px solid rgba(255,255,255,0.1);
}
.profile-menu button { width:100%; padding:10px; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer; }
.profile-menu button:hover{background:rgba(255,255,255,0.2);}
#profilePreview { width:80px; height:80px; border-radius:50%; margin-bottom:10px; object-fit:cover; display:block; margin-left:auto;margin-right:auto;}

  .online { color: #22c55e; font-weight: 600; }  /* green for online */
.offline { color: gray; font-style: italic; }   /* gray for offline */

/* ===== MOBILE ===== */
@media(max-width:700px){
  body{ align-items:flex-start; padding-top:60px; }
  .dashboard-container{ height:92vh; }
  .profile-container{ top:66px; }
}
</style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <h2>Chats</h2>
    <input type="text" id="searchUser" class="search" placeholder="Search username...">
    <div id="userList" class="user-list"></div>
  </div>
</div>

<div class="profile-container">
  <button id="profileBtn" class="profile-btn">
    <img id="profilePhoto" src="uploads/profile.webp">
    <span id="usernameText">+User</span>
  </button>

  <div id="profileMenu" class="profile-menu">
    <div><img id="profilePreview" src="uploads/profile.webp"></div>
    <button id="changeUsername">Change Username</button>
    <button id="changeEmail">Change Email</button>
    <button id="changePassword">Change Password</button>
    <button id="logoutBtn" style="background:#ff3b3b;">Logout</button>
  </div>
</div>

<audio id="msgSound" src="sounds/message.mp3" preload="auto"></audio>

<script src="/socket.io/socket.io.js"></script>
<script>
// ===== SETUP & SOCKET INITIALIZATION =====
const socket = io();
const userId = localStorage.getItem("userId");
if (!userId) window.location.href = "index.html";

let onlineUsers = [];
let unreadMessages = {};
const searchInput = document.getElementById("searchUser");

// Register user
socket.emit("register", userId);

// ===== PROFILE MENU LOGIC =====
const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");
const usernameSpan = document.getElementById("usernameText");
let username = localStorage.getItem("username") || "User";
usernameSpan.innerText = "+" + username;

profileBtn.addEventListener("click", e => {
  e.stopPropagation();
  profileMenu.style.display = profileMenu.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", () => { profileMenu.style.display = "none"; });
profileMenu.addEventListener("click", e => e.stopPropagation());

// ===== USER SETTINGS (USERNAME/EMAIL/PASS) =====
document.getElementById("changeUsername").addEventListener("click", async () => {
  const newName = prompt("Enter new username:");
  if(!newName) return;
  const cleanName = newName.startsWith("+") ? newName.slice(1) : newName;
  await fetch("/change-username", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ userId: userId, username: cleanName })});
  username = "+" + cleanName; usernameSpan.innerText = username; localStorage.setItem("username", cleanName);
  alert("Username updated!");
});

document.getElementById("changeEmail").addEventListener("click", async () => {
  const newEmail = prompt("Enter new email:"); if(!newEmail) return;
  await fetch("/change-email", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ userId: userId, email: newEmail })});
  alert("Email updated!");
});

document.getElementById("changePassword").addEventListener("click", async () => {
  const newPass = prompt("Enter new password:"); if(!newPass) return;
  await fetch("/change-password", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ userId: userId, password: newPass })});
  alert("Password updated!");
});

document.getElementById("logoutBtn").addEventListener("click", () => { localStorage.clear(); window.location.href="index.html"; });

// ===== LOAD USERS FUNCTION =====
function formatUsername(name){ return name.startsWith("+")?name:"+"+name; }

async function loadUsers(search=""){
  const list = document.getElementById("userList");
  const res = await fetch(`/users?search=${search}&exclude=${userId}`, { cache: "no-store" });
  const users = await res.json();
  list.innerHTML="";
  
  users.forEach(u=>{
    const div = document.createElement("div");
    div.classList.add("user");
    div.id = `user-${u._id}`; 
    
    const photo = "uploads/profile.webp"; 
    const isOnline = onlineUsers.includes(u._id) || u.online;
    const lastSeen = u.lastSeen ? new Date(u.lastSeen).toLocaleTimeString() : "";

    div.innerHTML = `
      <img src="${photo}" class="user-photo">
      <div class="user-info">
        <span class="username">${formatUsername(u.username)}</span>
        <span class="status">${isOnline?"🟢 Online":"⚫ Offline"}</span>
        <span class="last-seen">${!isOnline && lastSeen?"Last seen: "+lastSeen:""}</span>
      </div>
      <span class="badge" id="badge-${u._id}">${unreadMessages[u._id]||""}</span>
    `;
    
    div.addEventListener("click", ()=>{
      unreadMessages[u._id] = 0;
      updateBadge(u._id);
      window.location.href = `chat.html?user=${u._id}&name=${formatUsername(u.username)}`;
    });
    list.appendChild(div);
    updateBadge(u._id);
  });
}

function updateBadge(id){
  const badge = document.getElementById(`badge-${id}`);
  if(!badge) return;
  const count = unreadMessages[id]||0;
  badge.textContent = count>0?count:"";
  badge.style.display = count>0?"inline-block":"none";
}

// ===== AUTOMATIC TRIGGERS (THE FIX) =====

// 1. Load users as soon as the socket connects
socket.on("connect", () => {
    loadUsers(searchInput.value);
});

// 2. Load users when online list changes
socket.on("online-users", users=>{
  onlineUsers = users;
  loadUsers(searchInput.value);
});

// 3. Listen for new registration or status changes
socket.on("newUser", () => loadUsers(searchInput.value));
socket.on("userStatusChanged", () => loadUsers(searchInput.value));

// 4. Manual Search
searchInput.addEventListener("input", e=>loadUsers(e.target.value));

// ===== MERGED NOTIFICATIONS & SOUND (CLEAN VERSION) =====
socket.on("private message", data => {
    // 1. Play sound & Vibrate (Wakes up the Android WebView)
    msgSound.play();
    if (navigator.vibrate) {
        navigator.vibrate(200);
    }

    // 2. Update the unread count
    unreadMessages[data.from] = (unreadMessages[data.from] || 0) + 1;

    // 3. Force the UI to refresh (Shows the green badge immediately)
    loadUsers(searchInput.value); 

    // 4. Show System Notification
    if (Notification.permission === "granted") {
        new Notification("New Message", {
            body: data.message,
            icon: "uploads/profile.webp"
        });
    }
});

// Initial backup load
loadUsers();
</script>

  <script src="realtime.js"></script>
  
</body>
</html>
