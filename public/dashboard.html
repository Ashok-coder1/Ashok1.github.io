<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Gara Dashboard</title>
<style>
/* ===== GLOBAL RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#000,#0f172a,#1e3a8a);
  display:flex; justify-content:center; align-items:center;
}

/* ===== DASHBOARD ===== */
.dashboard-container{
  width:95%; max-width:1200px; height:90vh;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:15px; display:flex; overflow:hidden;
}
.sidebar{ width:100%; padding:20px; color:white; display:flex; flex-direction:column; }
.search{ width:100%; padding:10px; margin:10px 0; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; }
.user-list{flex:1; overflow-y:auto;}
.user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,0.06);cursor:pointer;position:relative;color:white;}
.user:hover{background:rgba(37,99,235,0.3);}
.user-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;}
.user-info{display:flex;flex-direction:column;}
.username{font-weight:600;}
.status{font-size:12px;opacity:0.8;}
.last-seen{font-size:10px;opacity:0.6;}
.badge{position:absolute;right:10px;top:12px;background:#22c55e;color:white;font-size:12px;padding:2px 7px;border-radius:20px;min-width:20px;text-align:center;display:none;}

/* ===== PROFILE BUTTON ===== */
.profile-container { position:fixed; top:20px; right:20px; z-index:99999; }
.profile-btn {
  display:flex; align-items:center; gap:10px; padding:8px 15px;
  border-radius:30px; border:none; color:white; cursor:pointer;
  background:linear-gradient(45deg,#ff0000,#2563eb);
}
#profilePhoto { width:35px; height:35px; border-radius:50%; object-fit:cover; }

/* ===== PROFILE MENU ===== */
.profile-menu {
  display:none; position:absolute; top:60px; right:0; width:220px;
  background:#0f172a; padding:15px; border-radius:12px;
  flex-direction:column; gap:10px; border:1px solid rgba(255,255,255,0.1);
}
.profile-menu button { width:100%; padding:10px; border-radius:8px; border:none; background:rgba(255,255,255,0.1); color:white; cursor:pointer; }
.profile-menu button:hover{background:rgba(255,255,255,0.2);}
#profilePreview { width:80px; height:80px; border-radius:50%; margin-bottom:10px; object-fit:cover; display:block; margin-left:auto;margin-right:auto;}

.online { color: #22c55e; font-weight: 600; }  /* green for online */
.offline { color: gray; font-style: italic; }   /* gray for offline */

/* ===== MOBILE ===== */
@media(max-width:700px){
  body{ align-items:flex-start; padding-top:60px; }
  .dashboard-container{ height:92vh; }
  .profile-container{ top:66px; }
}
</style>
</head>
<body>

<div class="dashboard-container">
  <div class="sidebar">
    <h2>Chats</h2>
    <input type="text" id="searchUser" class="search" placeholder="Search username...">
    <div id="userList" class="user-list"></div>
  </div>
</div>

<div class="profile-container">
  <button id="profileBtn" class="profile-btn">
    <img id="profilePhoto" src="uploads/profile.webp">
    <span id="usernameText">+User</span>
  </button>

  <div id="profileMenu" class="profile-menu">
    <div><img id="profilePreview" src="uploads/profile.webp"></div>
    <button id="changeUsername">Change Username</button>
    <button id="changeEmail">Change Email</button>
    <button id="changePassword">Change Password</button>
    <button id="logoutBtn" style="background:#ff3b3b;">Logout</button>
  </div>
</div>

<audio id="msgSound" src="sounds/message.mp3" preload="auto"></audio>

<script src="/socket.io/socket.io.js"></script>

<script>
// ===== SETUP & SOCKET INITIALIZATION =====
const socket = io();
const userId = localStorage.getItem("userId");

// If no user is logged in, send them back to login page
if (!userId) {
    window.location.href = "index.html";
}

// Register this user with the server
socket.emit("register", userId);

// Note: onlineUsers and unreadMessages are managed inside realtime.js 
// to avoid conflicting with this script.

// ===== PROFILE MENU LOGIC =====
const profileBtn = document.getElementById("profileBtn");
const profileMenu = document.getElementById("profileMenu");
const usernameSpan = document.getElementById("usernameText");
let username = localStorage.getItem("username") || "User";
usernameSpan.innerText = "+" + username;

profileBtn.addEventListener("click", e => {
    e.stopPropagation();
    profileMenu.style.display = profileMenu.style.display === "flex" ? "none" : "flex";
});

document.addEventListener("click", () => { profileMenu.style.display = "none"; });
profileMenu.addEventListener("click", e => e.stopPropagation());

// ===== LOGOUT LOGIC =====
document.getElementById("logoutBtn").addEventListener("click", () => { 
    localStorage.clear(); 
    window.location.href="index.html"; 
});

// ===== SETTINGS UPDATES =====
// (Keep your existing change-username, email, password fetch logic here)

// ===== SEARCH LOGIC =====
const searchInput = document.getElementById("searchUser");
searchInput.addEventListener("input", () => {
    // This calls the function inside realtime.js
    if (typeof fetchAndRefreshUsers === "function") {
        fetchAndRefreshUsers();
    }
});

// Sound and Vibration for incoming messages
socket.on("private message", data => {
    const msgSound = document.getElementById("msgSound");
    if (msgSound) msgSound.play();
    if (navigator.vibrate) navigator.vibrate(200);
});
</script>

<script src="realtime.js"></script>

</body>
</html>
