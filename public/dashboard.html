<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Gara</title>
<link rel="stylesheet" href="style1.css">
</head>
<body>

<div class="dashboard-container">

  <!-- ===== HEADER ===== -->
  <div class="dashboard-header">
    <img id="profilePhoto" src="uploads/profile.jpg" class="profile-photo">
    <span id="usernameDisplay">+User</span>
    <button id="logoutBtn">Logout</button>
  </div>

  <!-- ===== SEARCH USERS ===== -->
  <input type="text" id="searchUser" placeholder="Search users..." class="search-input">

  <!-- ===== USER LIST ===== -->
  <div id="userList" class="user-list"></div>

  <!-- ===== FOOTER ===== -->
  <div class="dashboard-footer">
    Powered by: <a href="https://www.webashok.com">Ashok Pokhrel</a>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script1.js"></script>
</body>
</html>
