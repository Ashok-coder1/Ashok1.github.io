<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Gara Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card" id="card">

    <div class="front">
      <h2>Sign In</h2>
      <form id="loginForm">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" id="loginBtn">Login</button>
        <p class="error-msg" id="loginError"></p>
      </form>

      <p class="switch">
        Don't have an account yet?
        <button type="button" id="showSignup">Sign Up</button>
      </p>

   <div style="text-align:center; margin-top:20px;">
  <small>
    Powered by 
    <a href="https://www.webashok.com" target="_blank" 
       style="color:#087ef4; font-weight:600; text-decoration:none;">
       Ashok Pokhrel
    </a>
  </small>
</div>

    </div>

    <div class="back">
      <h2>Create Account</h2>
      <form id="signupForm">
        <input type="text" id="username" placeholder="Username (ex: +Ashok)" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit" id="signupBtn">Register</button>
        <p class="error-msg" id="signupError"></p>
      </form>

      <p class="switch">
        Already have an account?
        <button type="button" id="showLogin">Sign In</button>
      </p>

  <div style="text-align:center; margin-top:20px;">
  <small>
    Powered by 
    <a href="https://www.webashok.com" target="_blank" 
       style="color:#087ef4; font-weight:600; text-decoration:none;">
       Ashok Pokhrel
    </a>
  </small>
</div>

    </div>

  </div>
</div>


<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
