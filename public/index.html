

<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Gara Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card" id="card">

    <!-- SIGN IN -->
    <div class="front">
      <h2>Sign In</h2>
      <form id="loginForm">
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p class="switch">
        Don't have an account yet? <button id="showSignup">Sign Up</button>
      </p>
    </div>

    <!-- SIGN UP -->
    <div class="back">
      <h2>Create Account</h2>
      <form id="signupForm">
        <input type="text" id="username" placeholder="+Username (ex: +Ashok)" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Register</button>
      </form>
      <p class="switch">
        Already have an account? <button id="showLogin">Sign In</button>
      </p>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
